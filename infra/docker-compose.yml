services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - db
    networks:
      - backend

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      RUN_SEED: "true"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"

      PORT: 3000

      PAYMENT_BASE_URL: ${PAYMENT_BASE_URL}
      PAYMENT_PUBLIC_KEY: ${PAYMENT_PUBLIC_KEY}
      PAYMENT_PRIVATE_KEY: ${PAYMENT_PRIVATE_KEY}
      PAYMENT_INTEGRITY_KEY: ${PAYMENT_INTEGRITY_KEY}
      PAYMENT_EVENTS_SECRET: ${PAYMENT_EVENTS_SECRET}

      BASE_FEE_CENTS: ${BASE_FEE_CENTS}
      DEFAULT_DELIVERY_FEE_CENTS: ${DEFAULT_DELIVERY_FEE_CENTS}
    ports:
      - "3001:3000"
    depends_on:
      - db
    networks:
      - backend

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  db_data:
